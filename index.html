<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Online World - P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- PeerJS: サーバー設定なしでP2P通信を可能にするライブラリ -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        #chat-log { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.5); }
        canvas { display: block; }
        /* フェードアウトする通知メッセージ用 */
        #toast { position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,255,0,0.8); color: black; padding: 10px 20px; border-radius: 20px; display: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="toast">コピーしました！</div>

    <div id="ui-layer" class="flex flex-col justify-between p-4 text-white">
        <div class="flex justify-between items-start">
            <div class="bg-black bg-opacity-50 p-3 rounded">
                <h1 class="font-bold text-lg">P2P OZ Simulator</h1>
                <p class="text-xs text-gray-300">WASDで移動 / マウスで視点操作 / Enterでチャット</p>
                <div id="status" class="text-xs text-yellow-400 mt-1 font-mono">ID生成中...</div>
                
                <!-- 招待ボタンの追加 -->
                <button id="copy-btn" class="mt-2 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-1 px-3 rounded pointer-events-auto transition-colors">
                    🔗 招待URLをコピーして友達を呼ぶ
                </button>
                
                <p id="user-count" class="text-xs text-blue-400 mt-2">接続人数: 1</p>
            </div>
        </div>

        <div class="w-full max-w-md pointer-events-auto">
            <div id="chat-log" class="p-2 text-sm rounded-t border-b border-gray-700"></div>
            <input type="text" id="chat-input" class="w-full bg-black bg-opacity-70 p-2 rounded-b focus:outline-none" placeholder="メッセージを入力...">
        </div>
    </div>

    <script>
        // --- PeerJS & Network Logic ---
        let peer;
        let myId;
        const connections = {};
        const remotePlayers = {};

        function initNetwork() {
            peer = new Peer();

            peer.on('open', (id) => {
                myId = id;
                document.getElementById('status').innerText = "ID: " + id;
                document.getElementById('status').classList.replace('text-yellow-400', 'text-green-400');
                
                // 自動接続チェック
                const params = new URLSearchParams(window.location.search);
                const target = params.get('join');
                if (target && target !== myId) {
                    const conn = peer.connect(target);
                    setupConnection(conn);
                }
            });

            peer.on('connection', (conn) => {
                setupConnection(conn);
            });
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                updateUserCount();
                addChatMessage("System", "新しいプレイヤーが接続しました");
                
                conn.on('data', (data) => {
                    handleNetworkData(conn.peer, data);
                });
            });

            conn.on('close', () => {
                removePlayer(conn.peer);
                addChatMessage("System", "プレイヤーが退出しました");
            });
        }

        function handleNetworkData(peerId, data) {
            if (data.type === 'move') {
                if (!remotePlayers[peerId]) {
                    remotePlayers[peerId] = createPlayerMesh(peerId, Math.random() * 0xffffff);
                }
                const p = remotePlayers[peerId];
                p.position.set(data.x, data.y, data.z);
                p.rotation.y = data.ry;
            } else if (data.type === 'chat') {
                addChatMessage(peerId, data.msg);
            }
        }

        function broadcast(data) {
            for (let id in connections) {
                if (connections[id].open) {
                    connections[id].send(data);
                }
            }
        }

        // --- 招待URLコピー機能 ---
        document.getElementById('copy-btn').onclick = () => {
            if (!myId) return;
            const url = window.location.origin + window.location.pathname + '?join=' + myId;
            
            // クリップボードにコピー
            const tempInput = document.createElement("input");
            tempInput.value = url;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            // 通知を表示
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        };

        // --- Three.js Setup ---
        let scene, camera, renderer, myAvatar;
        let controls = { forward: false, backward: false, left: false, right: false };
        let yaw = 0, pitch = 0;
        let frameCount = 0;
        
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            scene.fog = new THREE.Fog(0x111122, 10, 50);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            scene.add(sun);
            scene.add(new THREE.GridHelper(100, 50, 0x4444ff, 0x222244));

            myAvatar = new THREE.Group();
            scene.add(myAvatar);
            myAvatar.position.set(Math.random()*10-5, 1, Math.random()*10-5);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.addEventListener('keydown', (e) => updateControls(e.code, true));
            document.addEventListener('keyup', (e) => updateControls(e.code, false));
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', () => {
                if (document.activeElement.tagName !== 'INPUT') renderer.domElement.requestPointerLock();
            });
        }

        function updateControls(code, state) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (code === 'KeyW' || code === 'ArrowUp') controls.forward = state;
            if (code === 'KeyS' || code === 'ArrowDown') controls.backward = state;
            if (code === 'KeyA' || code === 'ArrowLeft') controls.left = state;
            if (code === 'KeyD' || code === 'ArrowRight') controls.right = state;
            if (code === 'Enter' && state) document.getElementById('chat-input').focus();
        }

        function onMouseMove(e) {
            if (document.pointerLockElement === renderer.domElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
            }
        }

        function createPlayerMesh(id, color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.4), new THREE.MeshPhongMaterial({ color }));
            body.position.y = 0.5;
            group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshPhongMaterial({ color: 0xffffff }));
            head.position.y = 1.3;
            group.add(head);
            scene.add(group);
            return group;
        }

        function removePlayer(id) {
            if (remotePlayers[id]) {
                scene.remove(remotePlayers[id]);
                delete remotePlayers[id];
            }
            delete connections[id];
            updateUserCount();
        }

        function updateUserCount() {
            document.getElementById('user-count').innerText = `接続人数: ${Object.keys(connections).length + 1}`;
        }

        function addChatMessage(sender, msg) {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.className = "mb-1";
            const name = sender.length > 8 ? sender.slice(0,5) : sender;
            div.innerHTML = `<span class="text-blue-400 font-mono text-xs">${name}:</span> ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const msg = e.target.value;
                addChatMessage('You', msg);
                broadcast({ type: 'chat', msg: msg });
                e.target.value = "";
                e.target.blur();
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (myAvatar) {
                const speed = 0.1;
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();

                if (controls.forward) myAvatar.position.addScaledVector(dir, speed);
                if (controls.backward) myAvatar.position.addScaledVector(dir, -speed);
                if (controls.left) myAvatar.position.addScaledVector(side, speed);
                if (controls.right) myAvatar.position.addScaledVector(side, -speed);
                myAvatar.rotation.y = yaw;
                
                camera.position.copy(myAvatar.position);
                camera.position.y += 0.8;
                camera.rotation.set(pitch, yaw, 0, 'YXZ');

                if (frameCount % 3 === 0 && myId) {
                    broadcast({
                        type: 'move',
                        x: myAvatar.position.x, y: myAvatar.position.y, z: myAvatar.position.z,
                        ry: myAvatar.rotation.y
                    });
                }
            }
            frameCount++;
            renderer.render(scene, camera);
        }

        window.onload = () => {
            initThree();
            initNetwork();
            animate();
        };
    </script>
</body>
</html>
