<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OZ Online Clicker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        
        body { 
            margin: 0; 
            background: #f0f9ff; 
            font-family: 'M PLUS Rounded 1c', sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* ダイヤモンドの輝きアニメーション */
        .crystal-glow {
            filter: drop-shadow(0 0 30px rgba(14, 165, 233, 0.5));
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .crystal-glow:active {
            transform: scale(0.85);
        }

        /* 浮遊テキスト */
        .floating-text {
            position: absolute;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            font-weight: 900;
            color: #0ea5e9;
            z-index: 50;
            font-size: 1.5rem;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
        }

        /* スムーズなスクロール */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .upgrade-card {
            transition: all 0.2s;
            flex-shrink: 0;
            width: 140px;
        }
        .upgrade-card:active { transform: scale(0.95); }
        .upgrade-card:disabled {
            opacity: 0.5;
            filter: grayscale(1);
            transform: none;
        }

        /* チャットのフェードアウト効果 */
        #chat-section {
            mask-image: linear-gradient(to top, black 80%, transparent 100%);
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 通知トースト -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 bg-sky-600/90 backdrop-blur text-white px-6 py-3 rounded-full font-bold shadow-xl z-[100] hidden animate-bounce">
        招待リンクをコピーしました！
    </div>

    <!-- ヘッダー：ステータス -->
    <header class="p-4 flex justify-between items-center bg-white/70 backdrop-blur-lg shadow-sm z-20">
        <div id="user-info" class="flex items-center gap-2 cursor-pointer bg-white p-1 pr-4 rounded-full shadow-sm active:scale-95 transition-transform border border-sky-100">
            <div id="p-avatar" class="w-9 h-9 rounded-full bg-sky-400 flex items-center justify-center text-lg shadow-inner">👤</div>
            <div class="max-w-[80px] sm:max-w-none">
                <div id="p-name" class="text-xs font-bold text-gray-800 truncate">読み込み中...</div>
                <div class="text-[9px] text-sky-500 font-black uppercase">Master</div>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <div class="text-[10px] text-gray-400 font-bold">WORLD TOTAL</div>
            <div id="global-score" class="text-sky-600 font-black text-sm">0</div>
        </div>
        <button id="copy-btn" class="bg-sky-500 text-white w-10 h-10 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform">🔗</button>
    </header>

    <main class="flex-1 relative flex flex-col items-center justify-start pt-10 overflow-hidden">
        <!-- スコア表示 -->
        <div class="text-center z-10 pointer-events-none mb-8">
            <div class="text-gray-400 text-xs font-bold tracking-widest uppercase">My Points</div>
            <div id="score-display" class="text-6xl font-black text-sky-600 tracking-tighter drop-shadow-sm">0</div>
            <div class="mt-2 inline-flex items-center gap-1 bg-white/80 px-3 py-1 rounded-full shadow-sm border border-sky-50">
                <span class="text-amber-400 text-xs">⚡</span>
                <span id="cps-display" class="text-xs font-bold text-gray-600">0</span>
                <span class="text-[9px] text-gray-400 font-bold uppercase">pts/sec</span>
            </div>
        </div>

        <!-- クリック対象 -->
        <div id="main-clicker" class="flex-1 flex items-center justify-center w-full max-h-[300px]">
            <div class="relative group">
                <div class="absolute inset-0 bg-sky-400/30 blur-[60px] rounded-full scale-150 animate-pulse"></div>
                <div class="text-[140px] crystal-glow select-none">💎</div>
            </div>
        </div>
    </main>

    <!-- 下部操作パネル：スマホ向けUI -->
    <div class="bg-white rounded-t-[32px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-30 p-5 flex flex-col gap-4">
        
        <!-- アップグレードリスト -->
        <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
            <button id="upg-click" class="upgrade-card bg-sky-50 border-2 border-sky-100 p-3 rounded-2xl text-left">
                <div class="flex justify-between items-start">
                    <span class="text-2xl">🔥</span>
                    <span class="text-[10px] bg-white px-2 py-0.5 rounded-full font-bold text-sky-500">POWER</span>
                </div>
                <div class="font-bold text-xs mt-1 text-gray-700">クリック強化</div>
                <div class="text-sky-600 font-black mt-2 text-sm"><span id="upg-click-cost">10</span> <span class="text-[9px]">pts</span></div>
            </button>

            <button id="upg-auto" class="upgrade-card bg-indigo-50 border-2 border-indigo-100 p-3 rounded-2xl text-left">
                <div class="flex justify-between items-start">
                    <span class="text-2xl">🤖</span>
                    <span class="text-[10px] bg-white px-2 py-0.5 rounded-full font-bold text-indigo-500">AUTO</span>
                </div>
                <div class="font-bold text-xs mt-1 text-gray-700">自動ツール</div>
                <div class="text-indigo-600 font-black mt-2 text-sm"><span id="upg-auto-cost">50</span> <span class="text-[9px]">pts</span></div>
            </button>

            <button id="upg-mega" class="upgrade-card bg-purple-50 border-2 border-purple-100 p-3 rounded-2xl text-left">
                <div class="flex justify-between items-start">
                    <span class="text-2xl">🏢</span>
                    <span class="text-[10px] bg-white px-2 py-0.5 rounded-full font-bold text-purple-500">MEGA</span>
                </div>
                <div class="font-bold text-xs mt-1 text-gray-700">研究所</div>
                <div class="text-purple-600 font-black mt-2 text-sm"><span id="upg-mega-cost">500</span> <span class="text-[9px]">pts</span></div>
            </button>
        </div>

        <!-- チャット・入力：最小限に -->
        <div class="flex flex-col gap-3">
            <div id="chat-section" class="h-16 overflow-y-auto space-y-1 text-[10px] hide-scrollbar"></div>
            <div class="flex gap-2">
                <input type="text" id="chat-input" class="flex-1 bg-gray-100 p-3 rounded-2xl text-sm outline-none border-2 border-transparent focus:border-sky-300 transition-all" placeholder="メッセージを送る...">
                <button id="chat-send" class="bg-gray-800 text-white w-12 h-12 flex items-center justify-center rounded-2xl shadow-md active:scale-90 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 名前変更モーダル -->
    <div id="name-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[200] flex items-end sm:items-center justify-center hidden">
        <div class="bg-white p-8 rounded-t-[40px] sm:rounded-[32px] w-full max-w-sm shadow-2xl animate-in slide-in-from-bottom duration-300">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h3 class="font-black text-xl text-gray-800 mb-2">名前を変更</h3>
            <p class="text-xs text-gray-400 mb-6 font-bold">オンラインで表示されるあなたの名前です</p>
            <input type="text" id="name-input" class="w-full bg-gray-50 p-4 rounded-2xl mb-6 border-2 border-sky-100 focus:border-sky-500 outline-none text-lg font-bold" maxlength="10">
            <div class="flex gap-3">
                <button id="name-cancel" class="flex-1 py-4 text-gray-400 font-bold text-sm">戻る</button>
                <button id="name-confirm" class="flex-2 py-4 px-8 bg-sky-500 text-white rounded-2xl font-black shadow-lg shadow-sky-200">決定</button>
            </div>
        </div>
    </div>

    <script>
        const gameState = {
            score: 0,
            clickPower: 1,
            autoCps: 0,
            globalTotal: 0,
            costs: { click: 10, auto: 50, mega: 500 },
            name: "User_" + Math.floor(Math.random() * 900 + 100),
            id: null
        };

        const connections = {};
        let peer;

        function initNetwork() {
            peer = new Peer();
            peer.on('open', (id) => {
                gameState.id = id;
                updateUI();
                const urlParams = new URLSearchParams(window.location.search);
                const joinId = urlParams.get('join');
                if (joinId && joinId !== id) connectToPeer(joinId);
                addSystemMessage("オンライン：接続完了");
            });
            peer.on('connection', setupConnection);
        }

        function connectToPeer(id) {
            setupConnection(peer.connect(id));
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                addSystemMessage("誰かが参加しました");
                conn.send({ type: 'hello', name: gameState.name });
                conn.on('data', handleData);
            });
            conn.on('close', () => delete connections[conn.peer]);
        }

        function handleData(data) {
            switch(data.type) {
                case 'click':
                    gameState.globalTotal += data.amount;
                    updateUI();
                    break;
                case 'upgrade':
                    addSystemMessage(`${data.name}が「${data.item}」を購入！`);
                    break;
                case 'chat':
                    addChatMessage(data.name, data.msg);
                    break;
            }
        }

        function broadcast(data) {
            Object.values(connections).forEach(c => { if(c.open) c.send(data); });
        }

        function updateUI() {
            document.getElementById('score-display').innerText = Math.floor(gameState.score).toLocaleString();
            document.getElementById('cps-display').innerText = gameState.autoCps.toLocaleString();
            document.getElementById('global-score').innerText = gameState.globalTotal.toLocaleString();
            document.getElementById('p-name').innerText = gameState.name;

            const btnClick = document.getElementById('upg-click');
            const btnAuto = document.getElementById('upg-auto');
            const btnMega = document.getElementById('upg-mega');

            btnClick.disabled = gameState.score < gameState.costs.click;
            btnAuto.disabled = gameState.score < gameState.costs.auto;
            btnMega.disabled = gameState.score < gameState.costs.mega;

            document.getElementById('upg-click-cost').innerText = gameState.costs.click;
            document.getElementById('upg-auto-cost').innerText = gameState.costs.auto;
            document.getElementById('upg-mega-cost').innerText = gameState.costs.mega;
        }

        function createFloatingText(e, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = '+' + text;
            
            // タッチとクリックの両方に対応
            const x = e.clientX || (e.touches ? e.touches[0].clientX : window.innerWidth/2);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : window.innerHeight/2);
            
            el.style.left = (x - 20) + 'px';
            el.style.top = (y - 40) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        const clicker = document.getElementById('main-clicker');
        
        // スマホでのレスポンス向上のためタッチスタートを使用
        const handleClick = (e) => {
            e.preventDefault();
            gameState.score += gameState.clickPower;
            gameState.globalTotal += gameState.clickPower;
            createFloatingText(e, gameState.clickPower);
            broadcast({ type: 'click', amount: gameState.clickPower });
            updateUI();
        };

        clicker.addEventListener('touchstart', handleClick, { passive: false });
        clicker.addEventListener('mousedown', (e) => {
            if ('ontouchstart' in window) return;
            handleClick(e);
        });

        document.getElementById('upg-click').onclick = () => {
            if (gameState.score >= gameState.costs.click) {
                gameState.score -= gameState.costs.click;
                gameState.clickPower += 1;
                gameState.costs.click = Math.floor(gameState.costs.click * 1.6);
                broadcast({ type: 'upgrade', name: gameState.name, item: 'パワー' });
                updateUI();
            }
        };

        document.getElementById('upg-auto').onclick = () => {
            if (gameState.score >= gameState.costs.auto) {
                gameState.score -= gameState.costs.auto;
                gameState.autoCps += 1;
                gameState.costs.auto = Math.floor(gameState.costs.auto * 1.4);
                broadcast({ type: 'upgrade', name: gameState.name, item: 'オート' });
                updateUI();
            }
        };

        document.getElementById('upg-mega').onclick = () => {
            if (gameState.score >= gameState.costs.mega) {
                gameState.score -= gameState.costs.mega;
                gameState.autoCps += 10;
                gameState.costs.mega = Math.floor(gameState.costs.mega * 1.5);
                broadcast({ type: 'upgrade', name: gameState.name, item: 'メガ' });
                updateUI();
            }
        };

        setInterval(() => {
            if (gameState.autoCps > 0) {
                const step = gameState.autoCps / 10;
                gameState.score += step;
                gameState.globalTotal += step;
                updateUI();
            }
        }, 100);

        function addChatMessage(name, msg) {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center";
            div.innerHTML = `<span class="font-black text-sky-500 whitespace-nowrap">${name}:</span><span class="text-gray-600 truncate">${msg}</span>`;
            const chatSec = document.getElementById('chat-section');
            chatSec.appendChild(div);
            chatSec.scrollTop = chatSec.scrollHeight;
        }

        function addSystemMessage(msg) {
            const div = document.createElement('div');
            div.className = "text-[9px] text-gray-300 font-bold italic";
            div.innerText = `> ${msg}`;
            document.getElementById('chat-section').appendChild(div);
        }

        document.getElementById('chat-send').onclick = () => {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            addChatMessage("Me", msg);
            broadcast({ type: 'chat', name: gameState.name, msg: msg });
            input.value = "";
        };

        const modal = document.getElementById('name-modal');
        const nameInput = document.getElementById('name-input');
        document.getElementById('user-info').onclick = () => {
            nameInput.value = gameState.name;
            modal.classList.remove('hidden');
        };
        document.getElementById('name-cancel').onclick = () => modal.classList.add('hidden');
        document.getElementById('name-confirm').onclick = () => {
            if (nameInput.value.trim()) {
                gameState.name = nameInput.value.trim();
                updateUI();
                modal.classList.add('hidden');
            }
        };

        document.getElementById('copy-btn').onclick = () => {
            const url = window.location.origin + window.location.pathname + '?join=' + gameState.id;
            const ta = document.createElement("textarea");
            ta.value = url;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            
            const t = document.getElementById('toast');
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        };

        window.onload = initNetwork;
    </script>
</body>
</html>
