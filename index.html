<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OZ Online Clicker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        
        body { 
            margin: 0; 
            background: #f0f9ff; 
            font-family: 'M PLUS Rounded 1c', sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        .crystal-glow {
            filter: drop-shadow(0 0 30px rgba(14, 165, 233, 0.5));
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .crystal-glow:active {
            transform: scale(0.8);
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            font-weight: 900;
            color: #0ea5e9;
            z-index: 50;
            font-size: 2rem;
            text-shadow: 0 2px 8px rgba(255,255,255,0.9);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }

        .tab-content {
            display: none;
            height: 100%;
            animation: fadeIn 0.2s ease-out;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .nav-btn.active {
            color: #0ea5e9;
            background: #f0f9ff;
        }

        .upgrade-card:disabled {
            opacity: 0.6;
            filter: grayscale(0.8);
        }

        /* 通知ドット */
        .notification-dot {
            position: absolute;
            top: 2px;
            right: 25%;
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 9999px;
            border: 2px solid white;
            display: none;
        }
        .notification-dot.show {
            display: block;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 通知トースト -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 bg-sky-600/90 backdrop-blur text-white px-6 py-3 rounded-full font-bold shadow-xl z-[100] hidden">
        招待リンクをコピーしました！
    </div>

    <!-- ヘッダー：共通ステータス -->
    <header class="p-4 flex justify-between items-center bg-white/70 backdrop-blur-lg shadow-sm z-20 shrink-0">
        <div id="user-info-btn" class="flex items-center gap-2 cursor-pointer bg-white p-1 pr-4 rounded-full shadow-sm active:scale-95 transition-transform border border-sky-100">
            <div class="w-8 h-8 rounded-full bg-sky-400 flex items-center justify-center text-white text-sm">👤</div>
            <div class="flex flex-col">
                <div id="p-name" class="text-xs font-bold text-gray-800 max-w-[80px] truncate">読み込み中...</div>
                <div id="online-count" class="text-[8px] text-green-500 font-bold">1名接続中</div>
            </div>
        </div>
        <div class="text-center">
            <div id="score-display" class="text-2xl font-black text-sky-600">0</div>
            <div class="text-[9px] text-gray-400 font-bold tracking-tight">TOTAL POINTS</div>
        </div>
        <button id="copy-btn" class="bg-sky-50 text-sky-500 w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition-transform font-bold">🔗</button>
    </header>

    <!-- メインコンテンツエリア -->
    <div class="flex-1 overflow-hidden relative">
        
        <!-- タブ1: クリック画面 -->
        <section id="tab-home" class="tab-content active items-center pt-8">
            <!-- 現在の能力値ステータス -->
            <div class="flex gap-4 mb-4">
                <div class="bg-white px-4 py-2 rounded-2xl shadow-sm border border-sky-100 text-center">
                    <div class="text-[8px] font-bold text-gray-400 uppercase">Click Power</div>
                    <div id="stat-click" class="text-sm font-black text-sky-500">+1</div>
                </div>
                <div class="bg-white px-4 py-2 rounded-2xl shadow-sm border border-sky-100 text-center">
                    <div class="text-[8px] font-bold text-gray-400 uppercase">Auto Power</div>
                    <div id="stat-auto" class="text-sm font-black text-indigo-500">0/sec</div>
                </div>
            </div>

            <div id="main-clicker" class="relative flex-1 flex items-center justify-center w-full">
                <div class="absolute inset-0 bg-sky-300/20 blur-[80px] rounded-full scale-110"></div>
                <div class="text-[200px] crystal-glow select-none">💎</div>
            </div>

            <div class="p-8 w-full text-center">
                <div class="text-[10px] text-gray-400 font-bold mb-1 tracking-[0.2em]">WORLD GLOBAL CLICK</div>
                <div id="global-score" class="text-2xl font-black text-sky-400 tracking-wider">0</div>
            </div>
        </section>

        <!-- タブ2: アップグレード画面 -->
        <section id="tab-upgrades" class="tab-content p-6 overflow-y-auto">
            <h2 class="text-xl font-black text-gray-800 mb-6 flex items-center gap-2">
                <span>🛒</span> アップグレード
            </h2>
            <div class="grid gap-4">
                <button id="upg-click" class="upgrade-card w-full bg-white border-2 border-sky-100 p-5 rounded-[32px] flex items-center gap-4 text-left shadow-sm active:scale-[0.98]">
                    <div class="w-16 h-16 bg-sky-50 rounded-2xl flex items-center justify-center text-3xl">🔥</div>
                    <div class="flex-1">
                        <div class="font-bold text-gray-800 text-base">パワーアップ</div>
                        <div class="text-[10px] text-gray-400">クリック時の獲得量 +1</div>
                        <div class="text-sky-600 font-black mt-1 text-sm"><span id="upg-click-cost">10</span> <span class="text-[10px]">pts</span></div>
                    </div>
                </button>

                <button id="upg-auto" class="upgrade-card w-full bg-white border-2 border-indigo-100 p-5 rounded-[32px] flex items-center gap-4 text-left shadow-sm active:scale-[0.98]">
                    <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-3xl">🤖</div>
                    <div class="flex-1">
                        <div class="font-bold text-gray-800 text-base">自動ツール</div>
                        <div class="text-[10px] text-gray-400">1秒あたりの自動獲得 +1</div>
                        <div class="text-indigo-600 font-black mt-1 text-sm"><span id="upg-auto-cost">50</span> <span class="text-[10px]">pts</span></div>
                    </div>
                </button>
            </div>
        </section>

        <!-- タブ3: チャット画面 -->
        <section id="tab-chat" class="tab-content">
            <div class="p-5 flex-1 flex flex-col overflow-hidden">
                <h2 class="text-xl font-black text-gray-800 mb-4 flex items-center gap-2">
                    <span>💬</span> チャット
                </h2>
                <div id="chat-section" class="flex-1 bg-white/50 rounded-3xl p-4 overflow-y-auto space-y-3 shadow-inner border border-sky-50">
                    <div class="text-[10px] text-gray-300 text-center font-bold italic">— Welcome to the World Chat —</div>
                </div>
                <div class="mt-4 flex gap-2">
                    <input type="text" id="chat-input" class="flex-1 bg-white p-4 rounded-2xl text-sm outline-none shadow-sm border border-sky-100 focus:border-sky-400" placeholder="メッセージを入力...">
                    <button id="chat-send" class="bg-sky-500 text-white w-14 h-14 flex items-center justify-center rounded-2xl shadow-lg shadow-sky-100 active:scale-90 transition-transform font-bold">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </section>
    </div>

    <!-- ボトムナビゲーション -->
    <nav class="bg-white border-t border-gray-100 p-2 pb-6 flex justify-around items-center shrink-0 z-50">
        <button onclick="switchTab('home')" class="nav-btn active flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl relative transition-all">
            <span class="text-xl">💎</span>
            <span class="text-[10px] font-bold">メイン</span>
        </button>
        <button onclick="switchTab('upgrades')" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl relative transition-all">
            <span class="text-xl">🛒</span>
            <span class="text-[10px] font-bold">強化</span>
        </button>
        <button onclick="switchTab('chat')" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl relative transition-all">
            <div id="chat-notif" class="notification-dot"></div>
            <span class="text-xl">💬</span>
            <span class="text-[10px] font-bold">チャット</span>
        </button>
    </nav>

    <!-- メンバー・プロフィール・管理モーダル -->
    <div id="user-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[200] flex items-end sm:items-center justify-center hidden">
        <div class="bg-white p-8 rounded-t-[40px] sm:rounded-[32px] w-full max-w-sm shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xl text-gray-800">ルーム情報</h3>
                <button id="close-modal" class="text-gray-400 font-bold">✕</button>
            </div>
            
            <div class="mb-6">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">自分の名前</label>
                <div class="flex gap-2">
                    <input type="text" id="name-input" class="flex-1 bg-gray-50 p-4 rounded-2xl border-2 border-sky-100 focus:border-sky-500 outline-none font-bold" maxlength="10">
                    <button id="name-confirm" class="bg-sky-500 text-white px-6 rounded-2xl font-bold">更新</button>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">接続中のメンバー</label>
                <div id="member-list" class="space-y-2 max-h-40 overflow-y-auto pr-2">
                    <!-- メンバーが動的に追加される -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const gameState = {
            score: 0,
            clickPower: 1,
            autoCps: 0,
            globalTotal: 0,
            costs: { click: 10, auto: 50 },
            name: "User_" + Math.floor(Math.random() * 900 + 100),
            id: null,
            currentTab: 'home',
            unreadMessages: false
        };

        const members = {};
        const connections = {};
        let peer;

        function switchTab(tabId) {
            gameState.currentTab = tabId;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            const btnIndex = ['home', 'upgrades', 'chat'].indexOf(tabId);
            document.querySelectorAll('.nav-btn')[btnIndex].classList.add('active');

            if (tabId === 'chat') {
                gameState.unreadMessages = false;
                document.getElementById('chat-notif').classList.remove('show');
            }
        }

        function initNetwork() {
            peer = new Peer();
            peer.on('open', (id) => {
                gameState.id = id;
                members[id] = gameState.name;
                updateUI();
                updateMemberList();
                const urlParams = new URLSearchParams(window.location.search);
                const joinId = urlParams.get('join');
                if (joinId && joinId !== id) connectToPeer(joinId);
                addSystemMessage("ネットワークに接続しました");
            });
            peer.on('connection', setupConnection);
        }

        function connectToPeer(id) {
            setupConnection(peer.connect(id));
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                members[conn.peer] = "接続中...";
                conn.send({ type: 'hello', name: gameState.name });
                conn.on('data', (data) => handleData(conn, data));
            });
            conn.on('close', () => {
                const disconnectedName = members[conn.peer] || "不明なユーザー";
                addSystemMessage(`${disconnectedName}が退出しました`);
                delete connections[conn.peer];
                delete members[conn.peer];
                updateUI();
                updateMemberList();
            });
        }

        function handleData(conn, data) {
            switch(data.type) {
                case 'hello':
                    members[conn.peer] = data.name;
                    addSystemMessage(`${data.name}がオンラインになりました`);
                    updateUI();
                    updateMemberList();
                    break;
                case 'name_change':
                    const oldName = members[conn.peer];
                    members[conn.peer] = data.newName;
                    addSystemMessage(`${oldName}が名前を「${data.newName}」に変えました`);
                    updateUI();
                    updateMemberList();
                    break;
                case 'click':
                    gameState.globalTotal += data.amount;
                    updateUI();
                    break;
                case 'upgrade':
                    addSystemMessage(`${data.name}が「${data.item}」をゲット！`);
                    break;
                case 'chat':
                    addChatMessage(data.name, data.msg);
                    if (gameState.currentTab !== 'chat') {
                        gameState.unreadMessages = true;
                        document.getElementById('chat-notif').classList.add('show');
                    }
                    break;
            }
        }

        function broadcast(data) {
            Object.values(connections).forEach(c => { if(c.open) c.send(data); });
        }

        function updateUI() {
            // スコア表示
            document.getElementById('score-display').innerText = Math.floor(gameState.score).toLocaleString();
            document.getElementById('global-score').innerText = Math.floor(gameState.globalTotal).toLocaleString();
            document.getElementById('p-name').innerText = gameState.name;
            
            // ステータス表示
            document.getElementById('stat-click').innerText = `+${gameState.clickPower}`;
            document.getElementById('stat-auto').innerText = `${gameState.autoCps}/sec`;

            // オンライン人数
            const count = Object.keys(members).length;
            document.getElementById('online-count').innerText = `${count}名接続中`;

            // アップグレードボタン
            const btnClick = document.getElementById('upg-click');
            const btnAuto = document.getElementById('upg-auto');

            btnClick.disabled = gameState.score < gameState.costs.click;
            btnAuto.disabled = gameState.score < gameState.costs.auto;

            document.getElementById('upg-click-cost').innerText = gameState.costs.click;
            document.getElementById('upg-auto-cost').innerText = gameState.costs.auto;
        }

        function updateMemberList() {
            const list = document.getElementById('member-list');
            list.innerHTML = "";
            Object.keys(members).forEach(id => {
                const isMe = id === gameState.id;
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-3 bg-gray-50 rounded-2xl border border-gray-100";
                div.innerHTML = `
                    <div class="w-6 h-6 rounded-full ${isMe ? 'bg-sky-400' : 'bg-gray-300'} text-[10px] flex items-center justify-center text-white font-bold tracking-tighter">
                        ${isMe ? 'ME' : 'ID'}
                    </div>
                    <span class="text-sm font-bold text-gray-700 truncate">${members[id]}</span>
                    ${isMe ? '<span class="ml-auto text-[8px] bg-sky-100 text-sky-500 px-2 py-1 rounded-full font-black uppercase">You</span>' : ''}
                `;
                list.appendChild(div);
            });
        }

        function createFloatingText(e, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = '+' + text;
            const x = e.clientX || (e.touches ? e.touches[0].clientX : window.innerWidth/2);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : window.innerHeight/2);
            el.style.left = (x - 20) + 'px';
            el.style.top = (y - 40) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        const clicker = document.getElementById('main-clicker');
        const handleClick = (e) => {
            if (e.cancelable) e.preventDefault();
            gameState.score += gameState.clickPower;
            gameState.globalTotal += gameState.clickPower;
            createFloatingText(e, gameState.clickPower);
            broadcast({ type: 'click', amount: gameState.clickPower });
            updateUI();
        };

        clicker.addEventListener('touchstart', handleClick, { passive: false });
        clicker.addEventListener('mousedown', (e) => {
            if ('ontouchstart' in window) return;
            handleClick(e);
        });

        document.getElementById('upg-click').onclick = () => {
            if (gameState.score >= gameState.costs.click) {
                gameState.score -= gameState.costs.click;
                gameState.clickPower += 1;
                gameState.costs.click = Math.floor(gameState.costs.click * 1.6);
                broadcast({ type: 'upgrade', name: gameState.name, item: 'パワーアップ' });
                updateUI();
            }
        };

        document.getElementById('upg-auto').onclick = () => {
            if (gameState.score >= gameState.costs.auto) {
                gameState.score -= gameState.costs.auto;
                gameState.autoCps += 1;
                gameState.costs.auto = Math.floor(gameState.costs.auto * 1.4);
                broadcast({ type: 'upgrade', name: gameState.name, item: 'オート' });
                updateUI();
            }
        };

        setInterval(() => {
            if (gameState.autoCps > 0) {
                const step = gameState.autoCps / 10;
                gameState.score += step;
                gameState.globalTotal += step;
                updateUI();
            }
        }, 100);

        function addChatMessage(name, msg) {
            const div = document.createElement('div');
            div.className = "flex flex-col gap-0.5";
            div.innerHTML = `<span class="text-[10px] font-black text-sky-500">${name}</span>
                             <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-sm text-gray-700 max-w-[85%]">${msg}</div>`;
            const chatSec = document.getElementById('chat-section');
            chatSec.appendChild(div);
            chatSec.scrollTop = chatSec.scrollHeight;
        }

        function addSystemMessage(msg) {
            const div = document.createElement('div');
            div.className = "text-[10px] text-gray-400 text-center py-1 font-bold";
            div.innerText = `— ${msg} —`;
            document.getElementById('chat-section').appendChild(div);
        }

        document.getElementById('chat-send').onclick = () => {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            addChatMessage("Me", msg);
            broadcast({ type: 'chat', name: gameState.name, msg: msg });
            input.value = "";
        };

        const modal = document.getElementById('user-modal');
        document.getElementById('user-info-btn').onclick = () => {
            document.getElementById('name-input').value = gameState.name;
            updateMemberList();
            modal.classList.remove('hidden');
        };
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');

        document.getElementById('name-confirm').onclick = () => {
            const newName = document.getElementById('name-input').value.trim();
            if (newName && newName !== gameState.name) {
                gameState.name = newName;
                members[gameState.id] = newName;
                broadcast({ type: 'name_change', newName: newName });
                updateUI();
                updateMemberList();
                addSystemMessage("名前を更新しました");
            }
        };

        document.getElementById('copy-btn').onclick = () => {
            const url = window.location.origin + window.location.pathname + '?join=' + gameState.id;
            const ta = document.createElement("textarea");
            ta.value = url;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            
            const t = document.getElementById('toast');
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        };

        window.onload = initNetwork;
    </script>
</body>
</html>
