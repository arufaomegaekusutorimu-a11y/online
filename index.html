<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GAMING CLICKER - NEON YELLOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root {
            --app-height: 100%;
            --neon-yellow: #facc15;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
        }

        body { 
            margin: 0; 
            background: var(--dark-bg); 
            font-family: 'Orbitron', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
            height: var(--app-height);
            color: #ffffff;
        }

        /* ゲーミング発光エフェクト */
        .neon-text {
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.5), 0 0 20px rgba(250, 204, 21, 0.3);
        }

        .neon-border {
            border: 1px solid var(--neon-yellow);
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.2);
        }

        .main-character-glow {
            filter: drop-shadow(0 0 30px rgba(250, 204, 21, 0.4));
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            max-width: 80%;
            height: auto;
        }
        .main-character-glow:active {
            transform: scale(0.92) rotate(-2deg);
        }

        .progress-bar-fill {
            transition: width 0.4s ease-out;
            background: linear-gradient(90deg, #ca8a04, #facc15);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.6);
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            font-weight: 900;
            color: var(--neon-yellow);
            z-index: 50;
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(250, 204, 21, 1);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.4) rotate(10deg); opacity: 0; }
        }

        .tab-content {
            display: none;
            height: 100%;
            animation: slideIn 0.3s ease-out;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .nav-btn.active {
            color: var(--neon-yellow);
            border-top: 3px solid var(--neon-yellow);
            background: linear-gradient(to bottom, rgba(250, 204, 21, 0.1), transparent);
        }

        /* ゲーミングボタンの装飾 */
        .btn-gaming {
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            transition: all 0.2s;
        }
        .btn-gaming:active {
            filter: brightness(1.2);
            transform: skew(-2deg);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col">

    <!-- 通知トースト -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 bg-yellow-400 text-black px-8 py-3 rounded-none font-black shadow-[0_0_20px_rgba(250,204,21,0.5)] z-[100] hidden text-center w-[85%] italic skew-x-[-10deg]">
        LINK COPIED TO CLIPBOARD
    </div>

    <!-- ヘッダー: ゲーミングブラック -->
    <header class="p-4 bg-[#111] border-b-2 border-yellow-400/30 z-20 shrink-0">
        <div class="flex justify-between items-center mb-4">
            <div id="user-info-btn" class="flex items-center gap-2 cursor-pointer bg-black/50 p-1 pr-4 border-l-4 border-yellow-400 active:scale-95 transition-transform max-w-[45%]">
                <div class="w-8 h-8 bg-yellow-400 flex items-center justify-center text-black font-black text-xs shrink-0 italic">OP</div>
                <div class="flex flex-col min-w-0">
                    <div id="p-name" class="text-[10px] font-bold text-yellow-400 truncate tracking-widest uppercase">PLAYER_ONE</div>
                    <div id="online-count" class="text-[7px] text-green-400 font-bold flex items-center gap-1">
                        <span class="w-1 h-1 bg-green-400 rounded-full animate-pulse"></span> ONLINE
                    </div>
                </div>
            </div>
            <div class="text-right flex-1 mx-2">
                <div id="score-display" class="text-2xl font-black text-yellow-400 neon-text italic">0</div>
                <div class="text-[8px] text-gray-500 font-black tracking-[0.3em] uppercase">Current Power</div>
            </div>
            <button id="copy-btn" class="bg-yellow-400 text-black w-10 h-10 flex items-center justify-center shrink-0 active:scale-90 transition-transform font-black skew-x-[-10deg]">🔗</button>
        </div>

        <!-- 目標進捗: デジタルゲージ -->
        <div class="px-1">
            <div class="flex justify-between items-end mb-1">
                <div class="text-[8px] font-black text-yellow-400 uppercase tracking-[0.2em]">System Overload</div>
                <div class="text-[10px] font-black text-yellow-400 italic"><span id="goal-percent">0</span>%</div>
            </div>
            <div class="w-full h-2 bg-black border border-yellow-400/20 overflow-hidden relative">
                <div id="progress-bar" class="progress-bar-fill h-full w-0"></div>
            </div>
            <div id="goal-text" class="text-[7px] text-right mt-1 text-gray-500 font-bold tracking-widest uppercase">Target: <span id="target-goal-val">1000</span> Units</div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <div class="flex-1 overflow-hidden relative bg-[radial-gradient(circle_at_center,_#1a1a1a_0%,_#0a0a0a_100%)]">
        
        <!-- 背景のグリッド装飾 -->
        <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(#facc15 1px, transparent 1px); background-size: 20px 20px;"></div>

        <!-- タブ1: メイン画面 -->
        <section id="tab-home" class="tab-content active items-center pt-6">
            <div id="goal-clear-banner" class="hidden bg-yellow-400 text-black px-10 py-1 font-black text-[10px] mb-4 shadow-[0_0_15px_rgba(250,204,21,0.6)] uppercase tracking-[0.5em] italic skew-x-[-15deg]">
                SYSTEM CLEARED
            </div>

            <div class="flex gap-3 mb-6">
                <div class="bg-black/60 border-l-2 border-yellow-400 px-4 py-2 text-center min-w-[110px]">
                    <div class="text-[7px] font-bold text-gray-500 uppercase tracking-widest">Manual</div>
                    <div id="stat-click" class="text-sm font-black text-yellow-400">+1</div>
                </div>
                <div class="bg-black/60 border-l-2 border-yellow-400 px-4 py-2 text-center min-w-[110px]">
                    <div class="text-[7px] font-bold text-gray-500 uppercase tracking-widest">Auto/sec</div>
                    <div id="stat-auto" class="text-sm font-black text-yellow-400">0</div>
                </div>
            </div>

            <!-- 画像クリックエリア -->
            <div id="main-clicker" class="relative flex-1 flex items-center justify-center w-full overflow-hidden">
                <div class="absolute w-64 h-64 bg-yellow-400/5 blur-[100px] rounded-full"></div>
                <!-- 枠線装飾 -->
                <div class="absolute w-72 h-72 border border-yellow-400/10 rounded-full animate-[spin_10s_linear_infinite]"></div>
                <div class="absolute w-80 h-80 border-t-2 border-b-2 border-yellow-400/20 rounded-full animate-[spin_15s_linear_infinite_reverse]"></div>
                
                <img src="1.png" alt="Character" class="main-character-glow select-none pointer-events-none" id="target-image">
            </div>

            <div class="p-6 w-full text-center bg-gradient-to-t from-black to-transparent">
                <div class="text-[8px] text-gray-500 font-black mb-1 tracking-[0.4em] uppercase italic">Global Network Power</div>
                <div id="global-score" class="text-2xl font-black text-yellow-400 tracking-widest neon-text italic">0</div>
            </div>
        </section>

        <!-- タブ2: アップグレード -->
        <section id="tab-upgrades" class="tab-content p-5 overflow-y-auto no-scrollbar">
            <h2 class="text-xl font-black text-yellow-400 mb-6 italic tracking-widest flex items-center gap-2">
                <span class="w-2 h-6 bg-yellow-400"></span> UPGRADES
            </h2>
            <div class="grid gap-4 pb-16">
                <button id="upg-click" class="upgrade-card w-full bg-[#151515] border border-yellow-400/20 p-4 flex items-center gap-4 text-left active:scale-[0.98] disabled:opacity-30 group transition-all">
                    <div class="w-12 h-12 bg-yellow-400/10 border border-yellow-400/30 flex items-center justify-center text-2xl shrink-0 group-hover:bg-yellow-400/20">⚡</div>
                    <div class="flex-1 min-w-0">
                        <div class="font-black text-white text-xs tracking-wider uppercase">Voltage Up</div>
                        <div class="text-[9px] text-gray-500 font-bold uppercase">Click Strength +1</div>
                        <div class="text-yellow-400 font-black mt-1 text-sm tracking-tighter italic"><span id="upg-click-cost">10</span> <span class="text-[9px]">CR</span></div>
                    </div>
                </button>

                <button id="upg-auto" class="upgrade-card w-full bg-[#151515] border border-yellow-400/20 p-4 flex items-center gap-4 text-left active:scale-[0.98] disabled:opacity-30 group transition-all">
                    <div class="w-12 h-12 bg-yellow-400/10 border border-yellow-400/30 flex items-center justify-center text-2xl shrink-0 group-hover:bg-yellow-400/20">⚙️</div>
                    <div class="flex-1 min-w-0">
                        <div class="font-black text-white text-xs tracking-wider uppercase">Auto Bot</div>
                        <div class="text-[9px] text-gray-500 font-bold uppercase">Passive Gain +1/sec</div>
                        <div class="text-yellow-400 font-black mt-1 text-sm tracking-tighter italic"><span id="upg-auto-cost">50</span> <span class="text-[9px]">CR</span></div>
                    </div>
                </button>
            </div>
        </section>

        <!-- タブ3: チャット -->
        <section id="tab-chat" class="tab-content">
            <div class="p-4 flex-1 flex flex-col overflow-hidden">
                <h2 class="text-xl font-black text-yellow-400 mb-4 italic tracking-widest flex items-center gap-2">
                    <span class="w-2 h-6 bg-yellow-400"></span> COMMS
                </h2>
                <div id="chat-section" class="flex-1 bg-black/40 border border-yellow-400/10 p-4 overflow-y-auto space-y-4 no-scrollbar"></div>
                <div class="mt-4 flex gap-2 pb-2">
                    <input type="text" id="chat-input" class="flex-1 bg-[#111] border border-yellow-400/30 p-3 text-xs outline-none focus:border-yellow-400 font-bold tracking-wider text-white" placeholder="TYPE MESSAGE...">
                    <button id="chat-send" class="bg-yellow-400 text-black px-5 flex items-center justify-center font-black skew-x-[-10deg] active:scale-95">SEND</button>
                </div>
            </div>
        </section>
    </div>

    <!-- ボトムナビ: ゲーミングブラック -->
    <nav class="bg-[#0f0f0f] border-t-2 border-yellow-400/30 p-1 pb-[max(0.5rem,env(safe-area-inset-bottom))] flex justify-around items-center shrink-0 z-50">
        <button onclick="switchTab('home')" class="nav-btn active flex-1 py-3 flex flex-col items-center gap-1 relative transition-all">
            <span class="text-lg">🎮</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Core</span>
        </button>
        <button onclick="switchTab('upgrades')" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 relative transition-all">
            <div id="upgrade-notif" class="absolute top-2 right-[30%] w-1.5 h-1.5 bg-red-500 rounded-full animate-ping hidden"></div>
            <span class="text-lg">🛠️</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Mod</span>
        </button>
        <button onclick="switchTab('chat')" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 relative transition-all">
            <div id="chat-notif" class="absolute top-2 right-[30%] w-1.5 h-1.5 bg-red-500 rounded-full animate-ping hidden"></div>
            <span class="text-lg">📟</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Net</span>
        </button>
    </nav>

    <!-- 設定モーダル: ゲーミングデザイン -->
    <div id="user-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[200] flex items-end sm:items-center justify-center hidden p-0 sm:p-4">
        <div class="bg-[#111] border-t-4 sm:border-4 border-yellow-400 w-full max-w-sm shadow-[0_0_50px_rgba(0,0,0,1)] max-h-[85vh] flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-6 bg-yellow-400 shrink-0">
                <h3 class="font-black text-lg text-black italic tracking-tighter uppercase">Config Menu</h3>
                <button id="close-modal" class="text-black p-1 font-black text-xl hover:rotate-90 transition-transform">✕</button>
            </div>
            
            <div class="p-6 space-y-8 overflow-y-auto no-scrollbar pb-16 flex-1">
                <section>
                    <label class="text-[9px] font-black text-yellow-400/60 uppercase tracking-[0.3em] block mb-3 italic">Identity Signature</label>
                    <div class="flex gap-2">
                        <input type="text" id="name-input" class="flex-1 bg-black border border-yellow-400/40 p-3 outline-none font-bold text-xs tracking-widest text-white focus:border-yellow-400" maxlength="12">
                        <button id="name-confirm" class="bg-yellow-400 text-black px-4 font-black text-xs uppercase italic skew-x-[-10deg]">Save</button>
                    </div>
                </section>

                <section id="host-settings" class="hidden border-t border-white/5 pt-6">
                    <label class="text-[9px] font-black text-yellow-400 uppercase tracking-[0.3em] block mb-3 italic">System Threshold (Host Only)</label>
                    <div class="flex gap-2">
                        <input type="number" id="goal-input" class="flex-1 bg-black border border-yellow-400/40 p-3 outline-none font-bold text-xs text-white focus:border-yellow-400" placeholder="ENTER GOAL">
                        <button id="goal-confirm" class="bg-yellow-400 text-black px-4 font-black text-xs uppercase italic skew-x-[-10deg]">Apply</button>
                    </div>
                </section>

                <section>
                    <label class="text-[9px] font-black text-yellow-400/60 uppercase tracking-[0.3em] block mb-3 italic">Active Nodes</label>
                    <div id="member-list" class="space-y-2"></div>
                </section>
                
                <div class="h-10"></div>
            </div>
        </div>
    </div>

    <script>
        const gameState = {
            score: 0,
            clickPower: 1,
            autoCps: 0,
            globalTotal: 0,
            targetGoal: 1000,
            costs: { click: 10, auto: 50 },
            name: "PILOT_" + Math.floor(Math.random() * 9000 + 1000),
            id: null,
            currentTab: 'home',
            isHost: false,
            goalReached: false
        };

        const members = {};
        const connections = {};
        let peer;

        // 見切れ防止: 高さを動的に更新
        const appHeight = () => {
            document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        };
        window.addEventListener('resize', appHeight);
        appHeight();

        function initNetwork() {
            peer = new Peer();
            peer.on('open', (id) => {
                gameState.id = id;
                members[id] = gameState.name;
                const urlParams = new URLSearchParams(window.location.search);
                const joinId = urlParams.get('join');
                if (!joinId) {
                    gameState.isHost = true;
                    document.getElementById('host-settings').classList.remove('hidden');
                    addSystemMessage("YOU ARE THE HOST");
                } else {
                    connectToPeer(joinId);
                }
                updateUI();
                updateMemberList();
            });
            peer.on('connection', setupConnection);
        }

        function connectToPeer(id) {
            setupConnection(peer.connect(id));
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                members[conn.peer] = "CONNECTING...";
                conn.send({ 
                    type: 'hello', 
                    name: gameState.name,
                    globalTotal: gameState.globalTotal,
                    targetGoal: gameState.targetGoal
                });
                conn.on('data', (data) => handleData(conn, data));
            });
            conn.on('close', () => {
                const dName = members[conn.peer] || "NODE";
                addSystemMessage(`${dName} DISCONNECTED`);
                delete connections[conn.peer];
                delete members[conn.peer];
                updateUI();
                updateMemberList();
            });
        }

        function handleData(conn, data) {
            switch(data.type) {
                case 'hello':
                    members[conn.peer] = data.name;
                    if (gameState.isHost) {
                        conn.send({ type: 'sync_goal', goal: gameState.targetGoal, globalTotal: gameState.globalTotal });
                    } else if (data.targetGoal) {
                        gameState.targetGoal = data.targetGoal;
                        gameState.globalTotal = Math.max(gameState.globalTotal, data.globalTotal || 0);
                    }
                    addSystemMessage(`${data.name} JOINED THE NET`);
                    updateUI();
                    updateMemberList();
                    break;
                case 'sync_goal':
                    gameState.targetGoal = data.goal;
                    if (data.globalTotal) gameState.globalTotal = data.globalTotal;
                    updateUI();
                    break;
                case 'name_change':
                    const oldName = members[conn.peer];
                    members[conn.peer] = data.newName;
                    addSystemMessage(`${oldName} >> ${data.newName}`);
                    updateMemberList();
                    break;
                case 'click':
                    gameState.globalTotal += data.amount;
                    updateUI();
                    break;
                case 'chat':
                    addChatMessage(data.name, data.msg);
                    if (gameState.currentTab !== 'chat') document.getElementById('chat-notif').classList.remove('hidden');
                    break;
            }
        }

        function broadcast(data) {
            Object.values(connections).forEach(c => { if(c.open) c.send(data); });
        }

        function updateUI() {
            document.getElementById('score-display').innerText = Math.floor(gameState.score).toLocaleString();
            document.getElementById('global-score').innerText = Math.floor(gameState.globalTotal).toLocaleString();
            document.getElementById('p-name').innerText = gameState.name;
            document.getElementById('online-count').innerHTML = `<span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span> ${Object.keys(members).length} NODE ACTIVE`;
            
            document.getElementById('stat-click').innerText = `+${gameState.clickPower}`;
            document.getElementById('stat-auto').innerText = `${gameState.autoCps}`;

            const percentage = Math.min(100, Math.floor((gameState.globalTotal / gameState.targetGoal) * 100));
            document.getElementById('progress-bar').style.width = `${percentage}%`;
            document.getElementById('goal-percent').innerText = percentage;
            document.getElementById('target-goal-val').innerText = gameState.targetGoal.toLocaleString();

            if (percentage >= 100) {
                if (!gameState.goalReached) {
                    gameState.goalReached = true;
                    addSystemMessage("CRITICAL LOAD REACHED: SYSTEM UNLOCKED");
                }
                document.getElementById('goal-clear-banner').classList.remove('hidden');
                document.getElementById('progress-bar').classList.add('shadow-[0_0_15px_rgba(250,204,21,1)]');
            } else {
                gameState.goalReached = false;
                document.getElementById('goal-clear-banner').classList.add('hidden');
            }

            const btnClick = document.getElementById('upg-click');
            const btnAuto = document.getElementById('upg-auto');
            const uNotif = document.getElementById('upgrade-notif');

            btnClick.disabled = gameState.score < gameState.costs.click;
            btnAuto.disabled = gameState.score < gameState.costs.auto;
            document.getElementById('upg-click-cost').innerText = gameState.costs.click;
            document.getElementById('upg-auto-cost').innerText = gameState.costs.auto;

            if ((!btnClick.disabled || !btnAuto.disabled) && gameState.currentTab !== 'upgrades') {
                uNotif.classList.remove('hidden');
            } else {
                uNotif.classList.add('hidden');
            }
        }

        function updateMemberList() {
            const list = document.getElementById('member-list');
            list.innerHTML = "";
            Object.keys(members).forEach(id => {
                const isMe = id === gameState.id;
                const div = document.createElement('div');
                div.className = `flex items-center gap-3 p-3 ${isMe ? 'bg-yellow-400/10 border-yellow-400/40' : 'bg-black/50 border-white/5'} border`;
                div.innerHTML = `
                    <div class="w-2 h-2 ${isMe ? 'bg-yellow-400' : 'bg-gray-600'} rounded-full"></div>
                    <span class="text-[10px] font-black ${isMe ? 'text-yellow-400' : 'text-gray-400'} uppercase tracking-widest truncate flex-1">${members[id]}</span>
                `;
                list.appendChild(div);
            });
        }

        const clicker = document.getElementById('main-clicker');
        const targetImage = document.getElementById('target-image');

        const handleClick = (e) => {
            if (e.cancelable) e.preventDefault();
            targetImage.style.transform = 'scale(0.85) rotate(-3deg)';
            setTimeout(() => targetImage.style.transform = 'scale(1) rotate(0deg)', 50);

            gameState.score += gameState.clickPower;
            gameState.globalTotal += gameState.clickPower;
            createFloatingText(e, gameState.clickPower);
            broadcast({ type: 'click', amount: gameState.clickPower });
            updateUI();
        };

        clicker.addEventListener('touchstart', handleClick, { passive: false });
        clicker.addEventListener('mousedown', (e) => { if (!('ontouchstart' in window)) handleClick(e); });

        function createFloatingText(e, text) {
            const el = document.createElement('div');
            el.className = 'floating-text italic';
            el.innerText = text;
            const rect = clicker.getBoundingClientRect();
            const x = e.clientX || (e.touches ? e.touches[0].clientX : rect.left + rect.width / 2);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : rect.top + rect.height / 2);
            el.style.left = (x - 25) + 'px';
            el.style.top = (y - 50) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        document.getElementById('upg-click').onclick = () => {
            if (gameState.score >= gameState.costs.click) {
                gameState.score -= gameState.costs.click;
                gameState.clickPower += 1;
                gameState.costs.click = Math.floor(gameState.costs.click * 1.8);
                updateUI();
            }
        };

        document.getElementById('upg-auto').onclick = () => {
            if (gameState.score >= gameState.costs.auto) {
                gameState.score -= gameState.costs.auto;
                gameState.autoCps += 1;
                gameState.costs.auto = Math.floor(gameState.costs.auto * 1.5);
                updateUI();
            }
        };

        document.getElementById('goal-confirm').onclick = () => {
            const val = parseInt(document.getElementById('goal-input').value);
            if (val > 0) {
                gameState.targetGoal = val;
                broadcast({ type: 'sync_goal', goal: val });
                addSystemMessage(`GOAL UPDATED: ${val}`);
                updateUI();
            }
        };

        setInterval(() => {
            if (gameState.autoCps > 0) {
                const step = gameState.autoCps / 10;
                gameState.score += step;
                gameState.globalTotal += step;
                updateUI();
            }
        }, 100);

        function switchTab(tabId) {
            gameState.currentTab = tabId;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            const btns = document.querySelectorAll('.nav-btn');
            const idx = ['home', 'upgrades', 'chat'].indexOf(tabId);
            btns[idx].classList.add('active');
            if (tabId === 'chat') document.getElementById('chat-notif').classList.add('hidden');
        }

        document.getElementById('chat-send').onclick = () => {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            addChatMessage(gameState.name, msg);
            broadcast({ type: 'chat', name: gameState.name, msg: msg });
            input.value = "";
        };

        function addChatMessage(name, msg) {
            const div = document.createElement('div');
            div.className = "flex flex-col gap-1";
            div.innerHTML = `<span class="text-[7px] font-black text-yellow-400 tracking-widest italic uppercase">${name}</span>
                             <div class="bg-yellow-400/5 border-l-2 border-yellow-400 px-4 py-2 text-xs text-white max-w-[95%] break-words font-bold tracking-wider">${msg}</div>`;
            const cs = document.getElementById('chat-section');
            cs.appendChild(div);
            cs.scrollTop = cs.scrollHeight;
        }

        function addSystemMessage(msg) {
            const div = document.createElement('div');
            div.className = "text-[7px] text-gray-600 text-center py-2 font-black tracking-[0.3em] italic border-y border-white/5";
            div.innerText = `:: ${msg} ::`;
            document.getElementById('chat-section').appendChild(div);
        }

        document.getElementById('user-info-btn').onclick = () => {
            document.getElementById('name-input').value = gameState.name;
            document.getElementById('user-modal').classList.remove('hidden');
        };
        document.getElementById('close-modal').onclick = () => document.getElementById('user-modal').classList.add('hidden');
        
        document.getElementById('name-confirm').onclick = () => {
            const n = document.getElementById('name-input').value.trim();
            if (n && n !== gameState.name) {
                gameState.name = n.toUpperCase();
                members[gameState.id] = gameState.name;
                broadcast({ type: 'name_change', newName: gameState.name });
                updateUI();
                updateMemberList();
                document.getElementById('user-modal').classList.add('hidden');
            }
        };

        document.getElementById('copy-btn').onclick = () => {
            const url = window.location.origin + window.location.pathname + '?join=' + gameState.id;
            const ta = document.createElement("textarea");
            ta.value = url;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            const t = document.getElementById('toast');
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        };

        window.onload = initNetwork;
    </script>
</body>
</html>
