<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Online World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        #chat-log { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.5); }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer" class="flex flex-col justify-between p-4 text-white">
        <div class="flex justify-between items-start">
            <div class="bg-black bg-opacity-50 p-3 rounded">
                <h1 class="font-bold text-lg">OZ Simulator</h1>
                <p class="text-xs text-gray-300">WASDで移動 / マウスで視点操作 / Enterでチャット</p>
                <p id="user-count" class="text-xs text-blue-400 mt-1">接続中...</p>
            </div>
            <div id="loading-screen" class="bg-black p-4 rounded font-bold animate-pulse">
                サーバー接続中...
            </div>
        </div>

        <div class="w-full max-w-md pointer-events-auto">
            <div id="chat-log" class="p-2 text-sm rounded-t border-b border-gray-700"></div>
            <input type="text" id="chat-input" class="w-full bg-black bg-opacity-70 p-2 rounded-b focus:outline-none" placeholder="メッセージを入力...">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Config ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vrc-demo';

        // --- Three.js Setup ---
        let scene, camera, renderer, floor;
        const players = {}; // 他のプレイヤーのメッシュ
        let myAvatar;
        let controls = { forward: false, backward: false, left: false, right: false };
        let yaw = 0, pitch = 0;
        
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            scene.fog = new THREE.Fog(0x111122, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(10, 20, 10);
            scene.add(sunLight);

            // Floor (Grid)
            const grid = new THREE.GridHelper(100, 50, 0x4444ff, 0x222244);
            scene.add(grid);
            
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x050505 });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // My Avatar Placeholder
            myAvatar = new THREE.Group();
            scene.add(myAvatar);
            myAvatar.position.y = 1;

            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('keydown', (e) => updateControls(e.code, true));
            document.addEventListener('keyup', (e) => updateControls(e.code, false));
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', () => {
                if (document.activeElement !== document.getElementById('chat-input')) {
                    renderer.domElement.requestPointerLock();
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateControls(code, state) {
            if (document.activeElement === document.getElementById('chat-input')) {
                controls.forward = controls.backward = controls.left = controls.right = false;
                return;
            }
            if (code === 'KeyW' || code === 'ArrowUp') controls.forward = state;
            if (code === 'KeyS' || code === 'ArrowDown') controls.backward = state;
            if (code === 'KeyA' || code === 'ArrowLeft') controls.left = state;
            if (code === 'KeyD' || code === 'ArrowRight') controls.right = state;
            if (code === 'Enter' && state) document.getElementById('chat-input').focus();
        }

        function onMouseMove(e) {
            if (document.pointerLockElement === renderer.domElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
            }
        }

        function createPlayerMesh(id, color = 0xffffff) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 1, 0.4),
                new THREE.MeshPhongMaterial({ color: color })
            );
            body.position.y = 0.5;
            group.add(body);

            // Head
            const head = new THREE.Mesh(
                new THREE.BoxGeometry(0.4, 0.4, 0.4),
                new THREE.MeshPhongMaterial({ color: 0xeeeeee })
            );
            head.position.y = 1.3;
            group.add(head);

            scene.add(group);
            return group;
        }

        // --- Multiplayer Logic ---
        let userId;
        const initAuth = async () => {
            try {
                const res = await signInAnonymously(auth);
                userId = res.user.uid;
                document.getElementById('loading-screen').style.display = 'none';
                startSync();
            } catch (err) {
                console.error(err);
                document.getElementById('loading-screen').innerText = "接続エラー";
            }
        };

        function startSync() {
            // 他のプレイヤーの監視
            const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            onSnapshot(playersCol, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const data = change.doc.data();
                    const id = change.doc.id;
                    if (id === userId) return;

                    if (change.type === "added" || change.type === "modified") {
                        if (!players[id]) {
                            players[id] = createPlayerMesh(id, Math.random() * 0xffffff);
                        }
                        players[id].position.set(data.x, data.y, data.z);
                        players[id].rotation.y = data.ry;
                    }
                    if (change.type === "removed") {
                        if (players[id]) {
                            scene.remove(players[id]);
                            delete players[id];
                        }
                    }
                });
                document.getElementById('user-count').innerText = `Online: ${Object.keys(players).length + 1}`;
            });

            // チャットの監視
            const chatCol = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
            onSnapshot(chatCol, (snapshot) => {
                const chatLog = document.getElementById('chat-log');
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        const div = document.createElement('div');
                        div.className = "mb-1";
                        div.innerHTML = `<span class="text-blue-400 font-mono text-xs">${data.user.slice(0,5)}:</span> ${data.msg}`;
                        chatLog.appendChild(div);
                        chatLog.scrollTop = chatLog.scrollHeight;
                    }
                });
            });

            // 定期的に自分の位置を送信
            setInterval(async () => {
                if (!userId) return;
                const userDoc = doc(db, 'artifacts', appId, 'public', 'data', 'players', userId);
                await setDoc(userDoc, {
                    x: myAvatar.position.x,
                    y: myAvatar.position.y,
                    z: myAvatar.position.z,
                    ry: myAvatar.rotation.y,
                    lastSeen: serverTimestamp()
                });
            }, 200);
        }

        // チャット送信
        document.getElementById('chat-input').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const msg = e.target.value;
                e.target.value = "";
                e.target.blur();
                const chatCol = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
                await setDoc(doc(chatCol), {
                    user: userId,
                    msg: msg,
                    time: serverTimestamp()
                });
            }
        });

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (myAvatar) {
                const speed = 0.1;
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0;
                dir.normalize();

                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();

                if (controls.forward) myAvatar.position.addScaledVector(dir, speed);
                if (controls.backward) myAvatar.position.addScaledVector(dir, -speed);
                if (controls.left) myAvatar.position.addScaledVector(side, speed);
                if (controls.right) myAvatar.position.addScaledVector(side, -speed);

                myAvatar.rotation.y = yaw;
                
                // Camera follows avatar
                camera.position.copy(myAvatar.position);
                camera.position.y += 0.8; // Eye level
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }

            renderer.render(scene, camera);
        }

        window.onload = () => {
            initThree();
            initAuth();
            animate();
        };

        // 退室時にデータを消す（簡易的）
        window.onbeforeunload = () => {
            if (userId) {
                const userDoc = doc(db, 'artifacts', appId, 'public', 'data', 'players', userId);
                deleteDoc(userDoc);
            }
        };

    </script>
</body>
</html>
